<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#333;
    color:white;
    padding:15px;
    text-align:center;
}

nav{
    background:#555;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
}

section{
    padding:30px;
}

.card{
    background:white;
    padding:20px;
    margin:20px 0;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    padding:10px 15px;
    border:none;
    background:#007BFF;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

footer{
    background:#333;
    color:white;
    text-align:center;
    padding:10px;
}
</style>

<script>
function showMessage(){
    alert("Thanks for visiting my page!");
}
</script>

</head>

<body>

<header>
<h1>My Web Page</h1>
<p>Simple HTML Page for Interview Demo</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Projects</a>
<a href="#">Contact</a>
</nav>

<section>

<div class="card">
<h2>About Me</h2>
<p>Hello! I am learning web development. This is a simple page created using HTML, CSS and JavaScript.</p>
</div>

<div class="card">
<h2>My Skills</h2>
<ul>
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
</ul>
</div>

<div class="card">
<h2>Demo Interaction</h2>
<p>Click the button below:</p>
<button onclick="showMessage()">Click Me</button>
</div>

</section>

<footer>
<p>© 2026 My Portfolio</p>
</footer>

</body>
</html>
